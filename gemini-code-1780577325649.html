<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プログラム・タイムテーブル </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#ffffff] text-slate-800 font-sans min-h-screen antialiased" x-data="timeTableApp()">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <div class="absolute top-0 right-0 pt-10 pr-4 text-xs text-slate-500">
            最終更新：2026年6月5日 23:51
        </div>
        
        <div class="mb-8">
            <p class="inline-block bg-slate-50 border border-slate-200/80 font-bold text-sm text-slate-600 px-4 py-2 rounded-xl">
                発表をクリックすると資料ダウンロードができます
            </p>
        </div>

        <div class="flex space-x-3 border-b border-slate-200/60 pb-4 mb-8">
            <template x-for="day in ['1日目 (6/19)', '2日目 (6/20)', '3日目 (6/21)']" :key="day">
                <button 
                    @click="activeDay = day.split(' ')[0]" 
                    :class="activeDay === day.split(' ')[0] ? 'bg-white border-slate-400 text-slate-900 font-bold shadow-xs' : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300'"
                    class="px-5 py-2.5 rounded-xl border text-sm transition-all duration-200 cursor-pointer"
                    x-text="day">
                </button>
            </template>
        </div>

        <div class="hidden md:flex flex-row gap-4 mb-2 select-none sticky top-0 bg-[#ffffff] z-10 py-2">
            <div class="w-20"></div> 
            
            <div class="flex-1 grid grid-cols-3 gap-4 text-center font-bold text-xs text-slate-400 uppercase tracking-wider">
                <div>中研修室4</div>
                <div>中研修室1</div>
                <div>中研修室2</div>
            </div>
        </div>

        <div class="space-y-6">
            <template x-for="slot in filteredSlots()" :key="slot.time">
                <div class="flex flex-col md:flex-row md:items-start gap-2 md:gap-4">
                    
                    <div class="w-20 pt-3 text-left md:text-right font-mono text-base font-bold text-slate-400 select-none md:pr-4" x-text="slot.time"></div>
                    
                    <div class="flex-1">
                        
                        <template x-if="slot.isGlobal">
                            <div class="w-full">
                                <template x-if="slot.events.global.isBreak">
                                    <div class="bg-[#F1F0EA]/50 border border-dashed border-slate-300 rounded-2xl p-4 flex items-center">
                                        <span class="font-bold text-slate-700 text-sm sm:text-base" x-text="slot.events.global.title"></span>
                                    </div>
                                </template>
                                <template x-if="!slot.events.global.isBreak">
                                    <div @click="slot.events.global.hasDetails ? toggleExpand(slot.events.global.id) : null"
                                         :class="slot.events.global.hasDetails ? 'cursor-pointer hover:border-slate-300' : ''"
                                         class="bg-white border border-slate-200/80 rounded-2xl p-5 shadow-[0_2px_8px_rgba(0,0,0,0.02)] transition-all">
                                        <div class="flex justify-between items-start">
                                            <h3 class="text-base sm:text-lg font-bold text-slate-900" x-text="slot.events.global.title"></h3>
                                            <span x-if="slot.events.global.hasDetails" class="text-slate-400 text-sm transition-transform pt-1" :class="isExpanded(slot.events.global.id) ? 'rotate-180' : ''">▼</span>
                                        </div>
                                        <div x-if="slot.events.global.speaker" class="flex items-center gap-2 mt-2">
                                            <div class="w-5 h-5 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs font-bold" x-text="slot.events.global.speaker.charAt(0)"></div>
                                            <span class="text-xs text-slate-600" x-text="slot.events.global.speaker"></span>
                                        </div>
                                        
                                        <div x-show="isExpanded(slot.events.global.id)" x-collapse x-cloak>
                                            <div class="mt-4 pt-4 border-t border-slate-100 text-sm text-slate-600 space-y-4">
                                                <p class="whitespace-pre-wrap bg-slate-50 p-3 rounded-xl border border-slate-100" x-text="slot.events.global.description"></p>
                                                <a x-if="slot.events.global.downloadUrl" :href="slot.events.global.downloadUrl" target="_blank" @click.stop class="inline-flex items-center gap-2 bg-teal-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-xs">📥 資料ダウンロード</a>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template x-if="!slot.isGlobal">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <template x-for="roomKey in ['roomA', 'roomB', 'roomC']">
                                    <div class="flex flex-col">
                                        <span class="md:hidden text-xxs font-bold text-slate-400 mb-1 ml-1" x-text="getRoomLabel(roomKey)"></span>
                                        
                                        <div class="flex-1 bg-white border border-slate-200/80 rounded-2xl p-4 shadow-[0_2px_8px_rgba(0,0,0,0.02)] transition-all flex flex-col justify-between"
                                             :class="slot.events[roomKey] ? (slot.events[roomKey].hasDetails ? 'cursor-pointer hover:border-slate-300' : '') : 'opacity-40 bg-slate-50/50 border-dashed'">
                                            
                                            <template x-if="slot.events[roomKey]">
                                                <div @click="slot.events[roomKey].hasDetails ? toggleExpand(slot.events[roomKey].id) : null">
                                                    <div class="flex justify-between items-start gap-2">
                                                        <h4 class="text-sm sm:text-base font-bold text-slate-900 leading-snug" x-text="slot.events[roomKey].title"></h4>
                                                        <span x-if="slot.events[roomKey].hasDetails" class="text-slate-400 text-xs transition-transform pt-0.5" :class="isExpanded(slot.events[roomKey].id) ? 'rotate-180' : ''">▼</span>
                                                    </div>
                                                    
                                                    <div x-if="slot.events[roomKey].speaker" class="flex items-center gap-1.5 mt-2.5">
                                                        <div class="w-5 h-5 rounded-full bg-blue-50 text-blue-600 border border-blue-100 flex items-center justify-center text-xxs font-bold" x-text="slot.events[roomKey].speaker.charAt(0)"></div>
                                                        <span class="text-xs font-medium text-slate-600" x-text="slot.events[roomKey].speaker"></span>
                                                    </div>
                                                    
                                                    <div class="mt-2.5">
                                                        <span :class="getTagClass(slot.events[roomKey].tag)" class="text-xxs px-2 py-0.5 rounded font-medium" x-text="slot.events[roomKey].tag"></span>
                                                    </div>

                                                    <div x-show="isExpanded(slot.events[roomKey].id)" x-collapse x-cloak>
                                                        <div class="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-600 space-y-3">
                                                            <p class="whitespace-pre-wrap bg-slate-50 p-2.5 rounded-xl border border-slate-100" x-text="slot.events[roomKey].description"></p>
                                                            <a x-if="slot.events[roomKey].downloadUrl" :href="slot.events[roomKey].downloadUrl" target="_blank" @click.stop class="inline-flex items-center gap-1.5 bg-teal-600 text-white px-3 py-1.5 rounded-lg text-xxs font-bold shadow-xs">📥 ダウンロード</a>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                            
                                            <template x-if="!slot.events[roomKey]">
                                                <div class="text-slate-400 text-xs italic py-4 text-center">発表なし</div>
                                            </template>
                                            
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                    </div>
                </div>
            </template>
        </div>

                getRoomLabel(key) {
                    const labels = { roomA: '第1会場 (会議室A)', roomB: '第2会場 (会議室B)', roomC: '第3会場 (会議室C)' };
                    return labels[key];
                },

                toggleExpand(id) {
                    if (this.expandedCards.includes(id)) {
                        this.expandedCards = this.expandedCards.filter(cardId => cardId !== id);
                    } else {
                        this.expandedCards.push(id);
                    }
                },
                isExpanded(id) {
                    return this.expandedCards.includes(id);
                },

                getTagClass(tag) {

                        '教員': 'bg-blue-50 text-blue-700 border border-blue-100',
                        '学生': 'bg-orange-50 text-orange-700 border border-orange-100',
                        '言語学': 'bg-teal-50 text-teal-700 border border-teal-100'
                    };
